name: deploy-web

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with: { version: 9.15.9 }

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Sanitize + mask secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_KEY: ${{ secrets.MOLODOST_DEPLOY_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "::add-mask::$(printf '%s' "$SERVER_HOST" | LC_ALL=C tr -cd '0-9.')"
          echo "::add-mask::$(printf '%s' "$SERVER_USER" | LC_ALL=C tr -cd 'a-zA-Z0-9_-')"

          SAN_HOST=$(printf '%s' "$SERVER_HOST" | LC_ALL=C tr -cd '0-9.')
          SAN_USER=$(printf '%s' "$SERVER_USER" | LC_ALL=C tr -cd 'a-zA-Z0-9_-')

          if printf '%s' "$DEPLOY_KEY" | grep -q '^LS0tLS1CRUdJTi'; then
            printf '%s' "$DEPLOY_KEY" | tr -d '\r\n[:space:]' | base64 -d > ~/.ssh/deploy_key
          else
            printf '%s\n' "$DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          echo "::add-mask::$HOME/.ssh/deploy_key"

          echo "SAN_HOST=$SAN_HOST" >> "$GITHUB_ENV"
          echo "SAN_USER=$SAN_USER" >> "$GITHUB_ENV"

      - name: Install + build
        run: |
          set -e
          find . -type d -name node_modules -prune -exec rm -rf {} + 2>/dev/null || true
          pnpm install --frozen-lockfile --config.confirmModulesPurge=false
          echo "=== typecheck ==="
          pnpm --filter @molodost/web run typecheck || echo "WARN: typecheck failed but continuing"
          echo "=== build ==="
          pnpm --filter @molodost/web exec vite build
          echo "=== verify dist ==="
          test -f apps/web/dist/index.html || { echo "FAIL: dist/index.html missing"; exit 1; }
          # -C apps/web/dist .  — package the dist contents flat (no dist/ prefix)
          # so it lands at $LIVE/index.html, matching nginx root /var/www/molodost48/web.
          tar -czf /tmp/molodost48-web-dist.tar.gz -C apps/web/dist .
          file /tmp/molodost48-web-dist.tar.gz

      - name: Upload + extract + reload nginx
        env:
          SERVER_HOST: ${{ env.SAN_HOST }}
          SERVER_USER: ${{ env.SAN_USER }}
        run: |
          set -e
          # Upload tarball via scp (more reliable than cat | ssh + heredoc)
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/dev/null \
              /tmp/molodost48-web-dist.tar.gz \
              "$SERVER_USER@$SERVER_HOST:/tmp/molodost48-web-dist.tar.gz"

          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/dev/null \
              "$SERVER_USER@$SERVER_HOST" bash -s <<'REMOTE'
          set -e
          id molodost 2>/dev/null || useradd -m -s /bin/bash -d /home/molodost molodost
          mkdir -p /var/www/molodost48/web
          chown -R molodost:molodost /var/www/molodost48/web

          STAGE=/var/www/molodost48/web.staging
          LIVE=/var/www/molodost48/web
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          tar -xzf /tmp/molodost48-web-dist.tar.gz -C "$STAGE"
          chown -R molodost:molodost "$STAGE"

          rm -rf "$LIVE"
          mv "$STAGE" "$LIVE"
          test -f "$LIVE/index.html" && echo "web deployed: $(du -sh $LIVE | cut -f1)"
          rm -f /tmp/molodost48-web-dist.tar.gz

          if [ -f /etc/nginx/sites-enabled/molodost48 ]; then
            nginx -t && systemctl reload nginx
          else
            echo "nginx site not configured yet — skipping reload"
          fi
          REMOTE

          rm -f /tmp/molodost48-web-dist.tar.gz