name: deploy-web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-web.yml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9.15.9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @molodost/web run typecheck
      - run: pnpm --filter @molodost/web run build

      - name: Build tarball
        run: |
          cd apps/web
          tar -czf /tmp/molodost48-web-dist.tar.gz dist
          ls -lh /tmp/molodost48-web-dist.tar.gz

      - name: Upload + extract + reload nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.MOLODOST_DEPLOY_KEY }}
          command_timeout: 5m
          script: |
            set -e
            id molodost 2>/dev/null || useradd -m -s /bin/bash -d /home/molodost molodost
            mkdir -p /var/www/molodost48/web
            chown -R molodost:molodost /var/www/molodost48/web

            STAGE=/var/www/molodost48/web.staging
            LIVE=/var/www/molodost48/web
            rm -rf "$STAGE"
            mkdir -p "$STAGE"
            tar -xzf /tmp/molodost48-web-dist.tar.gz -C "$STAGE"
            chown -R molodost:molodost "$STAGE"

            # Atomic swap
            rm -rf "$LIVE"
            mv "$STAGE" "$LIVE"
            test -f "$LIVE/index.html" && echo "web deployed: $(du -sh $LIVE | cut -f1)"

            # Nginx site (idempotent)
            if [ ! -f /etc/nginx/sites-enabled/molodost48 ]; then
              echo "nginx site not yet configured — skipping reload"
            else
              nginx -t && systemctl reload nginx
            fi