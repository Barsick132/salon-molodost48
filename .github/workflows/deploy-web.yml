name: deploy-web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-web.yml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9.15.9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @molodost/web run typecheck
      - run: pnpm --filter @molodost/web run build
      - run: tar -czf /tmp/molodost48-web-dist.tar.gz -C apps/web dist

      - name: Upload + extract + reload nginx
        env:
          DEPLOY_KEY: ${{ secrets.MOLODOST_DEPLOY_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Upload tarball over SSH stdin
          cat /tmp/molodost48-web-dist.tar.gz | ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/dev/null \
              "$SERVER_USER@$SERVER_HOST" bash -s <<'REMOTE'
          set -e
          id molodost 2>/dev/null || useradd -m -s /bin/bash -d /home/molodost molodost
          mkdir -p /var/www/molodost48/web
          chown -R molodost:molodost /var/www/molodost48/web

          STAGE=/var/www/molodost48/web.staging
          LIVE=/var/www/molodost48/web
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          tar -xzf - -C "$STAGE"
          chown -R molodost:molodost "$STAGE"

          rm -rf "$LIVE"
          mv "$STAGE" "$LIVE"
          test -f "$LIVE/index.html" && echo "web deployed: $(du -sh $LIVE | cut -f1)"

          if [ -f /etc/nginx/sites-enabled/molodost48 ]; then
            nginx -t && systemctl reload nginx
          else
            echo "nginx site not configured yet — skipping reload"
          fi
          REMOTE

          rm -f /tmp/molodost48-web-dist.tar.gz