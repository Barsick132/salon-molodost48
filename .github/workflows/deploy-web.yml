name: deploy-web

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with: { version: 9.15.9 }

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Sanitize secrets (aggressive whitelist)
        env:
          SERVER_HOST_RAW: ${{ secrets.SERVER_HOST }}
          SERVER_USER_RAW: ${{ secrets.SERVER_USER }}
          DEPLOY_KEY_RAW: ${{ secrets.MOLODOST_DEPLOY_KEY }}
        run: |
          set -e
          # Whitelist approach: IP only digits+dot; user only safe chars
          SERVER_HOST=$(printf '%s' "$SERVER_HOST_RAW" | LC_ALL=C tr -cd '0-9.')
          SERVER_USER=$(printf '%s' "$SERVER_USER_RAW" | LC_ALL=C tr -cd 'a-zA-Z0-9_-')
          # Key: auto-detect base64 vs raw openssh
          if printf '%s' "$DEPLOY_KEY_RAW" | grep -q '^LS0tLS1CRUdJTi'; then
            DEPLOY_KEY=$(printf '%s' "$DEPLOY_KEY_RAW" | tr -d '\r\n[:space:]' | base64 -d)
            echo "DEPLOY_KEY: decoded base64 ($(printf '%s' "$DEPLOY_KEY" | wc -c) bytes)"
          else
            DEPLOY_KEY=$(printf '%s' "$DEPLOY_KEY_RAW" | tr -d '\r')
            echo "DEPLOY_KEY: raw openssh ($(printf '%s' "$DEPLOY_KEY" | wc -c) bytes)"
          fi
          {
            echo "SAN_SERVER_HOST=$SERVER_HOST"
            echo "SAN_SERVER_USER=$SERVER_USER"
            echo "SAN_DEPLOY_KEY<<__KEY_EOF__"
            printf '%s' "$DEPLOY_KEY"
            echo ""
            echo "__KEY_EOF__"
          } >> "$GITHUB_ENV"

      - name: Install + build
        run: |
          set -e
          # Wipe node_modules to avoid pnpm interactive prompt
          find . -type d -name node_modules -prune -exec rm -rf {} + 2>/dev/null || true
          pnpm install --frozen-lockfile --config.confirmModulesPurge=false
          echo "=== typecheck ==="
          pnpm --filter @molodost/web run typecheck || echo "WARN: typecheck failed but continuing"
          echo "=== build ==="
          pnpm --filter @molodost/web exec vite build
          echo "=== dist contents ==="
          ls -la apps/web/dist/ | head -20
          test -f apps/web/dist/index.html || { echo "FAIL: dist/index.html missing"; exit 1; }
          tar -czf /tmp/molodost48-web-dist.tar.gz -C apps/web dist
          ls -la /tmp/molodost48-web-dist.tar.gz
          file /tmp/molodost48-web-dist.tar.gz

      - name: Upload + extract + reload nginx
        env:
          DEPLOY_KEY: ${{ env.SAN_DEPLOY_KEY }}
          SERVER_HOST: ${{ env.SAN_SERVER_HOST }}
          SERVER_USER: ${{ env.SAN_SERVER_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          # Note: GitHub Actions trims trailing \n from secrets, so add it back.
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ls -la ~/.ssh/deploy_key

          # Upload tarball over SSH stdin
          cat /tmp/molodost48-web-dist.tar.gz | ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/dev/null \
              "$SERVER_USER@$SERVER_HOST" bash -s <<'REMOTE'
          set -e
          id molodost 2>/dev/null || useradd -m -s /bin/bash -d /home/molodost molodost
          mkdir -p /var/www/molodost48/web
          chown -R molodost:molodost /var/www/molodost48/web

          STAGE=/var/www/molodost48/web.staging
          LIVE=/var/www/molodost48/web
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          tar -xzf - -C "$STAGE"
          chown -R molodost:molodost "$STAGE"

          rm -rf "$LIVE"
          mv "$STAGE" "$LIVE"
          test -f "$LIVE/index.html" && echo "web deployed: $(du -sh $LIVE | cut -f1)"

          if [ -f /etc/nginx/sites-enabled/molodost48 ]; then
            nginx -t && systemctl reload nginx
          else
            echo "nginx site not configured yet — skipping reload"
          fi
          REMOTE

          rm -f /tmp/molodost48-web-dist.tar.gz