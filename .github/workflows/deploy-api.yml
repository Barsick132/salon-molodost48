name: deploy-api

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-api.yml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Try SSH (just echo)
        env:
          DEPLOY_KEY: ${{ secrets.MOLODOST_DEPLOY_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "host=$SERVER_HOST user=$SERVER_USER key_len=${#DEPLOY_KEY}"
          ssh -vvv -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=10 \
              "$SERVER_USER@$SERVER_HOST" -- echo OK || \
              { echo SSH_FAILED; exit 1; }
          echo "SSH_OK"