name: deploy-api

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: SSH test 1 - simple command
        env:
          DEPLOY_KEY: ${{ secrets.MOLODOST_DEPLOY_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "--- TEST 1: simple command ---"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 "$SERVER_USER@$SERVER_HOST" echo HELLO
          echo "--- TEST 2: whoami ---"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null "$SERVER_USER@$SERVER_HOST" whoami
          echo "--- TEST 3: bash -lc ---"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null "$SERVER_USER@$SERVER_HOST" bash -lc 'echo LOGIN_SHELL_OK'