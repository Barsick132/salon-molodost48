name: deploy-api

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-api.yml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9.15.9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile --no-fund
      - run: pnpm --filter @molodost/api run db:generate
      - run: pnpm --filter @molodost/api run typecheck

      # Write deploy script to a file so we don't fight heredoc-in-heredoc
      - name: Write remote deploy script
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_KEY: ${{ secrets.MOLODOST_DEPLOY_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > /tmp/remote-deploy.sh <<'REMOTE_EOF'
          #!/usr/bin/env bash
          set -e
          export DEBIAN_FRONTEND=noninteractive

          echo "=== 0. Bootstrap ==="
          id molodost 2>/dev/null || useradd -m -s /bin/bash -d /home/molodost molodost
          mkdir -p /var/www/molodost48/{api,web} \
                   /var/log/molodost48 \
                   /var/lib/molodost48/{uploads,backups} \
                   /etc/molodost48
          chown -R molodost:molodost /var/www/molodost48 /var/log/molodost48 /var/lib/molodost48 || true
          echo "  ok"

          echo "=== 1. Pull source ==="
          cd /var/www/molodost48
          if [ ! -d api/.git ]; then
            rm -rf api
            sudo -u molodost -H bash -c "cd /var/www/molodost48 && git clone --depth 1 --branch main git@github.com:Barsick132/salon-molodost48.git api"
          else
            sudo -u molodost -H bash -c "cd /var/www/molodost48/api && git fetch --depth 1 origin main && git reset --hard origin/main"
          fi
          echo "  ok (HEAD=$(cd /var/www/molodost48/api && sudo -u molodost git rev-parse --short HEAD))"

          echo "=== 2. Install prod deps ==="
          sudo -u molodost -H bash -c "cd /var/www/molodost48/api && pnpm install --frozen-lockfile --no-fund"
          echo "  ok"

          echo "=== 3. Prisma generate (explicit) ==="
          sudo -u molodost -H bash -c "cd /var/www/molodost48/api/apps/api && pnpm exec prisma generate"
          echo "  ok"

          echo "=== 4. Migrate ==="
          set -a; source /etc/molodost48/api.env; set +a
          sudo -u molodost -H bash -c "cd /var/www/molodost48/api/apps/api && DATABASE_URL='$DATABASE_URL' pnpm exec prisma migrate deploy"
          echo "  ok"

          echo "=== 5. Ensure systemd unit ==="
          if [ ! -f /etc/systemd/system/molodost48-api.service ]; then
            systemctl stop molodost48-api 2>/dev/null || true
            cat > /etc/systemd/system/molodost48-api.service <<'UNIT_EOF'
          [Unit]
          Description=molodost48 API (Fastify + Prisma)
          After=network.target postgresql.service
          Wants=postgresql.service

          [Service]
          Type=simple
          User=molodost
          Group=molodost
          WorkingDirectory=/var/www/molodost48/api/apps/api
          EnvironmentFile=/etc/molodost48/api.env
          ExecStart=/usr/local/bin/pnpm run start
          Restart=on-failure
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=molodost48-api
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths=/var/lib/molodost48/uploads /var/lib/molodost48/backups /var/log/molodost48
          MemoryMax=384M
          TasksMax=64

          [Install]
          WantedBy=multi-user.target
          UNIT_EOF
            systemctl daemon-reload
            systemctl enable molodost48-api
          fi
          echo "  ok"

          echo "=== 6. Restart ==="
          systemctl restart molodost48-api
          sleep 3
          systemctl is-active molodost48-api
          echo "  ok"
          REMOTE_EOF
          chmod +x /tmp/remote-deploy.sh
          echo "=== remote script written ==="
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null \
              /tmp/remote-deploy.sh "$SERVER_USER@$SERVER_HOST:/tmp/remote-deploy.sh"
          echo "=== running on server ==="
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null \
              "$SERVER_USER@$SERVER_HOST" bash /tmp/remote-deploy.sh
          rm -f /tmp/remote-deploy.sh

      - name: Smoke test
        env:
          DEPLOY_KEY: ${{ secrets.MOLODOST_DEPLOY_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          sleep 2
          echo "=== /healthz ==="
          curl -fsS --max-time 5 http://127.0.0.1:3000/healthz && echo OK || \
            { echo FAIL; exit 1; }
          echo "=== /readyz ==="
          curl -fsS --max-time 5 http://127.0.0.1:3000/readyz && echo OK || \
            { echo READY_WARN; exit 1; }