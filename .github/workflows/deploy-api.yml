name: deploy-api

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with: { version: 9.15.9 }

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Sanitize + mask secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_KEY: ${{ secrets.MOLODOST_DEPLOY_KEY }}
        run: |
          set -e
          # Tell GitHub to mask sanitized values in any subsequent log line.
          echo "::add-mask::$(printf '%s' "$SERVER_HOST" | LC_ALL=C tr -cd '0-9.')"
          echo "::add-mask::$(printf '%s' "$SERVER_USER" | LC_ALL=C tr -cd 'a-zA-Z0-9_-')"

          # Whitelist sanitize
          SAN_HOST=$(printf '%s' "$SERVER_HOST" | LC_ALL=C tr -cd '0-9.')
          SAN_USER=$(printf '%s' "$SERVER_USER" | LC_ALL=C tr -cd 'a-zA-Z0-9_-')

          # Key: auto-detect base64 vs raw openssh. Don't echo bytes/lengths.
          if printf '%s' "$DEPLOY_KEY" | grep -q '^LS0tLS1CRUdJTi'; then
            printf '%s' "$DEPLOY_KEY" | tr -d '\r\n[:space:]' | base64 -d > ~/.ssh/deploy_key
          else
            # GH trims trailing \n, restore it
            printf '%s\n' "$DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          # Don't print file size or fingerprint (could leak via metadata).
          # Don't print "starts with" or other partial content.
          # Mark deploy_key path as masked too (in case GitHub tries to log it later)
          echo "::add-mask::$HOME/.ssh/deploy_key"

          # Export sanitized host/user for downstream steps
          echo "SAN_HOST=$SAN_HOST" >> "$GITHUB_ENV"
          echo "SAN_USER=$SAN_USER" >> "$GITHUB_ENV"

      - run: pnpm install --frozen-lockfile --config.confirmModulesPurge=false
      - run: pnpm --filter @molodost/api run db:generate
      - run: pnpm --filter @molodost/api run typecheck

      - name: SSH sanity test
        env:
          SERVER_HOST: ${{ env.SAN_HOST }}
          SERVER_USER: ${{ env.SAN_USER }}
        run: |
          set -e
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 \
              -o BatchMode=yes -o PasswordAuthentication=no \
              "$SERVER_USER@$SERVER_HOST" echo SSH_OK

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ env.SAN_HOST }}
          SERVER_USER: ${{ env.SAN_USER }}
        run: |
          set -e

          cat > /tmp/remote-deploy.sh <<'REMOTE_EOF'
          #!/usr/bin/env bash
          set -e
          export DEBIAN_FRONTEND=noninteractive

          echo "STEP 0: bootstrap"
          id molodost 2>/dev/null || useradd -m -s /bin/bash -d /home/molodost molodost
          mkdir -p /var/www/molodost48/{api,web} /var/log/molodost48 \
                   /var/lib/molodost48/{uploads,backups} /etc/molodost48
          chown -R molodost:molodost /var/www/molodost48 /var/log/molodost48 /var/lib/molodost48 || true

          echo "STEP 1: pull source"
          cd /var/www/molodost48
          if [ ! -d api/.git ]; then
            rm -rf api
            sudo -u molodost -H bash -c "cd /var/www/molodost48 && git clone --depth 1 --branch main git@github.com:Barsick132/salon-molodost48.git api"
          else
            sudo -u molodost -H bash -c "cd /var/www/molodost48/api && git fetch --depth 1 origin main && git reset --hard origin/main"
          fi

          echo "STEP 2: install prod deps"
          sudo -u molodost -H bash -c "cd /var/www/molodost48/api && find . -type d -name node_modules -prune -exec rm -rf {} + 2>/dev/null; true"
          sudo -u molodost -H bash -c "cd /var/www/molodost48/api && pnpm install --frozen-lockfile --config.confirmModulesPurge=false"

          echo "STEP 3: prisma generate"
          sudo -u molodost -H bash -c "cd /var/www/molodost48/api/apps/api && pnpm exec prisma generate"

          echo "STEP 4: migrate"
          set -a; source /etc/molodost48/api.env; set +a
          sudo -u molodost -H bash -c "cd /var/www/molodost48/api/apps/api && DATABASE_URL='$DATABASE_URL' pnpm exec prisma migrate deploy"

          echo "STEP 5: ensure systemd unit"
          if [ ! -f /etc/systemd/system/molodost48-api.service ]; then
            cat > /etc/systemd/system/molodost48-api.service <<'UNIT_EOF'
          [Unit]
          Description=molodost48 API (Fastify + Prisma)
          After=network.target postgresql.service
          Wants=postgresql.service
          [Service]
          Type=simple
          User=molodost
          Group=molodost
          WorkingDirectory=/var/www/molodost48/api/apps/api
          EnvironmentFile=/etc/molodost48/api.env
          ExecStart=/usr/local/bin/pnpm run start
          Restart=on-failure
          RestartSec=5
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths=/var/lib/molodost48/uploads /var/lib/molodost48/backups /var/log/molodost48
          MemoryMax=384M
          TasksMax=64
          [Install]
          WantedBy=multi-user.target
          UNIT_EOF
            systemctl daemon-reload
            systemctl enable molodost48-api
          fi

          echo "STEP 6: restart"
          systemctl restart molodost48-api
          sleep 3
          systemctl is-active molodost48-api
          echo "ALL OK"
          REMOTE_EOF
          chmod +x /tmp/remote-deploy.sh
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null \
              /tmp/remote-deploy.sh "$SERVER_USER@$SERVER_HOST:/tmp/remote-deploy.sh"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null \
              "$SERVER_USER@$SERVER_HOST" bash /tmp/remote-deploy.sh
          rm -f /tmp/remote-deploy.sh

      - name: Smoke test (via SSH to production server)
        env:
          SERVER_HOST: ${{ env.SAN_HOST }}
          SERVER_USER: ${{ env.SAN_USER }}
        run: |
          set -e
          echo "=== /healthz ==="
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 \
              "$SERVER_USER@$SERVER_HOST" curl -fsS --max-time 5 http://127.0.0.1:3000/healthz && echo OK
          echo "=== /readyz ==="
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 \
              "$SERVER_USER@$SERVER_HOST" curl -fsS --max-time 5 http://127.0.0.1:3000/readyz && echo OK