name: deploy-api

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9.15.9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sanitize secrets (aggressive whitelist)
        env:
          SERVER_HOST_RAW: ${{ secrets.SERVER_HOST }}
          SERVER_USER_RAW: ${{ secrets.SERVER_USER }}
          DEPLOY_KEY_RAW: ${{ secrets.MOLODOST_DEPLOY_KEY }}
        run: |
          set -e
          # Dump raw bytes for diagnostics (masked by GH if contains secret, but len/hex is OK)
          echo "=== RAW hex dump (first 80 bytes) ==="
          printf '%s' "$SERVER_HOST_RAW" | head -c 80 | xxd
          echo "=== RAW len ==="
          printf 'SERVER_HOST_RAW len=%d\n' "${#SERVER_HOST_RAW}"
          printf 'SERVER_USER_RAW len=%d\n' "${#SERVER_USER_RAW}"
          printf 'DEPLOY_KEY_RAW len=%d\n' "${#DEPLOY_KEY_RAW}"

          # Whitelist approach: IP only digits+dot; user only safe chars
          SERVER_HOST=$(printf '%s' "$SERVER_HOST_RAW" | LC_ALL=C tr -cd '0-9.')
          SERVER_USER=$(printf '%s' "$SERVER_USER_RAW" | LC_ALL=C tr -cd 'a-zA-Z0-9_-')
          # Key: auto-detect base64 (starts with LS0tLS1CRUdJTi which is base64 of '-----BEGIN')
          # or raw openssh format (starts with -----BEGIN). Don't strip \n from raw openssh!
          if printf '%s' "$DEPLOY_KEY_RAW" | grep -q '^LS0tLS1CRUdJTi'; then
            # Base64: strip whitespace, then decode
            DEPLOY_KEY=$(printf '%s' "$DEPLOY_KEY_RAW" | tr -d '\r\n[:space:]' | base64 -d)
            echo "DEPLOY_KEY: detected base64, decoded ($(printf '%s' "$DEPLOY_KEY" | wc -c) bytes)"
          else
            # Raw openssh: only strip \r (Windows line endings), preserve \n
            DEPLOY_KEY=$(printf '%s' "$DEPLOY_KEY_RAW" | tr -d '\r')
            echo "DEPLOY_KEY: using raw openssh ($(printf '%s' "$DEPLOY_KEY" | wc -c) bytes)"
          fi

          echo "=== CLEAN len ==="
          printf 'SERVER_HOST clean len=%d\n' "${#SERVER_HOST}"
          printf 'SERVER_USER clean len=%d\n' "${#SERVER_USER}"
          printf 'DEPLOY_KEY clean len=%d\n' "${#DEPLOY_KEY}"
          echo "=== CLEAN hex (first 32 bytes of HOST) ==="
          printf '%s' "$SERVER_HOST" | head -c 32 | xxd
          echo "=== CLEAN hex (first 32 bytes of USER) ==="
          printf '%s' "$SERVER_USER" | head -c 32 | xxd

          # Export to GITHUB_ENV for downstream steps (use EOF marker to avoid shell expansion issues)
          {
            echo "SAN_SERVER_HOST=$SERVER_HOST"
            echo "SAN_SERVER_USER=$SERVER_USER"
            # Use unique heredoc-style marker
            echo "SAN_DEPLOY_KEY<<__KEY_EOF__"
            printf '%s' "$DEPLOY_KEY"
            echo ""
            echo "__KEY_EOF__"
          } >> "$GITHUB_ENV"

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @molodost/api run db:generate
      - run: pnpm --filter @molodost/api run typecheck

      - name: SSH sanity test
        env:
          SERVER_HOST: ${{ env.SAN_SERVER_HOST }}
          SERVER_USER: ${{ env.SAN_SERVER_USER }}
          DEPLOY_KEY: ${{ env.SAN_DEPLOY_KEY }}
        run: |
          set -e
          echo "host=[$SERVER_HOST] user=[$SERVER_USER] len_host=${#SERVER_HOST} len_user=${#SERVER_USER}"
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "=== deploy_key size ==="
          ls -la ~/.ssh/deploy_key
          echo "=== deploy_key first 100 bytes (od -c) ==="
          head -c 100 ~/.ssh/deploy_key | od -c | head -8
          echo "=== deploy_key fingerprint ==="
          ssh-keygen -l -f ~/.ssh/deploy_key 2>&1 || echo "ssh-keygen FAILED"
          echo "=== ssh try ==="
          ssh -v -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 \
              -o BatchMode=yes -o PasswordAuthentication=no \
              "$SERVER_USER@$SERVER_HOST" echo SSH_OK 2>&1 | tail -30 || echo "SSH FAILED"

      - name: Deploy on server
        env:
          DEPLOY_KEY: ${{ env.SAN_DEPLOY_KEY }}
          SERVER_HOST: ${{ env.SAN_SERVER_HOST }}
          SERVER_USER: ${{ env.SAN_SERVER_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ls -la ~/.ssh/deploy_key

          cat > /tmp/remote-deploy.sh <<'REMOTE_EOF'
          #!/usr/bin/env bash
          set -e
          export DEBIAN_FRONTEND=noninteractive

          echo "STEP 0: bootstrap"
          id molodost 2>/dev/null || useradd -m -s /bin/bash -d /home/molodost molodost
          mkdir -p /var/www/molodost48/{api,web} /var/log/molodost48 \
                   /var/lib/molodost48/{uploads,backups} /etc/molodost48
          chown -R molodost:molodost /var/www/molodost48 /var/log/molodost48 /var/lib/molodost48 || true

          echo "STEP 1: pull source"
          cd /var/www/molodost48
          if [ ! -d api/.git ]; then
            rm -rf api
            sudo -u molodost -H bash -c "cd /var/www/molodost48 && git clone --depth 1 --branch main git@github.com:Barsick132/salon-molodost48.git api"
          else
            sudo -u molodost -H bash -c "cd /var/www/molodost48/api && git fetch --depth 1 origin main && git reset --hard origin/main"
          fi

          echo "STEP 2: install prod deps"
          sudo -u molodost -H bash -c "cd /var/www/molodost48/api && pnpm install --frozen-lockfile"

          echo "STEP 3: prisma generate"
          sudo -u molodost -H bash -c "cd /var/www/molodost48/api/apps/api && pnpm exec prisma generate"

          echo "STEP 4: migrate"
          set -a; source /etc/molodost48/api.env; set +a
          sudo -u molodost -H bash -c "cd /var/www/molodost48/api/apps/api && DATABASE_URL='$DATABASE_URL' pnpm exec prisma migrate deploy"

          echo "STEP 5: ensure systemd unit"
          if [ ! -f /etc/systemd/system/molodost48-api.service ]; then
            cat > /etc/systemd/system/molodost48-api.service <<'UNIT_EOF'
          [Unit]
          Description=molodost48 API (Fastify + Prisma)
          After=network.target postgresql.service
          Wants=postgresql.service
          [Service]
          Type=simple
          User=molodost
          Group=molodost
          WorkingDirectory=/var/www/molodost48/api/apps/api
          EnvironmentFile=/etc/molodost48/api.env
          ExecStart=/usr/local/bin/pnpm run start
          Restart=on-failure
          RestartSec=5
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths=/var/lib/molodost48/uploads /var/lib/molodost48/backups /var/log/molodost48
          MemoryMax=384M
          TasksMax=64
          [Install]
          WantedBy=multi-user.target
          UNIT_EOF
            systemctl daemon-reload
            systemctl enable molodost48-api
          fi

          echo "STEP 6: restart"
          systemctl restart molodost48-api
          sleep 3
          systemctl is-active molodost48-api
          echo "ALL OK"
          REMOTE_EOF
          chmod +x /tmp/remote-deploy.sh
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null \
              /tmp/remote-deploy.sh "$SERVER_USER@$SERVER_HOST:/tmp/remote-deploy.sh"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null \
              "$SERVER_USER@$SERVER_HOST" bash /tmp/remote-deploy.sh
          rm -f /tmp/remote-deploy.sh

      - name: Smoke test
        env:
          DEPLOY_KEY: ${{ env.SAN_DEPLOY_KEY }}
          SERVER_HOST: ${{ env.SAN_SERVER_HOST }}
          SERVER_USER: ${{ env.SAN_SERVER_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          sleep 2
          echo "=== /healthz ==="
          curl -fsS --max-time 5 http://127.0.0.1:3000/healthz && echo OK
          echo "=== /readyz ==="
          curl -fsS --max-time 5 http://127.0.0.1:3000/readyz && echo OK