name: deploy-api

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-api.yml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9.15.9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @molodost/api run db:generate
      - run: pnpm --filter @molodost/api run typecheck

      - name: Deploy on server
        env:
          DEPLOY_KEY: ${{ secrets.MOLODOST_DEPLOY_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/dev/null \
              "$SERVER_USER@$SERVER_HOST" bash -s <<'REMOTE'
          set -e
          export DEBIAN_FRONTEND=noninteractive

          # ----- 0. Bootstrap (idempotent) -----
          id molodost 2>/dev/null || useradd -m -s /bin/bash -d /home/molodost molodost
          mkdir -p /var/www/molodost48/api /var/www/molodost48/web \
                   /var/log/molodost48 \
                   /var/lib/molodost48/uploads /var/lib/molodost48/backups \
                   /etc/molodost48
          chown -R molodost:molodost /var/www/molodost48 /var/log/molodost48 /var/lib/molodost48 2>/dev/null || true

          # ----- 1. Clone or pull source -----
          cd /var/www/molodost48
          if [ ! -d api/.git ]; then
            rm -rf api
            sudo -u molodost git clone --depth 1 --branch main \
              git@github.com:Barsick132/salon-molodost48.git api
          else
            cd api
            sudo -u molodost git fetch --depth 1 origin main
            sudo -u molodost git reset --hard origin/main
            cd ..
          fi
          chown -R molodost:molodost api

          # ----- 2. Install prod deps -----
          cd /var/www/molodost48/api
          sudo -u molodost bash -lc 'cd /var/www/molodost48/api && pnpm install --prod --frozen-lockfile --ignore-scripts'

          # ----- 3. Apply migrations -----
          sudo -u molodost bash -lc 'cd /var/www/molodost48/api/apps/api && pnpm exec prisma migrate deploy'

          # ----- 4. Ensure systemd unit exists -----
          if [ ! -f /etc/systemd/system/molodost48-api.service ]; then
            cat > /etc/systemd/system/molodost48-api.service <<'UNIT'
          [Unit]
          Description=molodost48 API (Fastify + Prisma)
          After=network.target postgresql.service
          Wants=postgresql.service

          [Service]
          Type=simple
          User=molodost
          Group=molodost
          WorkingDirectory=/var/www/molodost48/api
          EnvironmentFile=/etc/molodost48/api.env
          ExecStart=/usr/bin/pnpm --filter @molodost/api run start
          Restart=on-failure
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=molodost48-api

          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths=/var/lib/molodost48/uploads /var/lib/molodost48/backups /var/log/molodost48
          MemoryMax=384M
          TasksMax=64

          [Install]
          WantedBy=multi-user.target
          UNIT
            systemctl daemon-reload
            systemctl enable molodost48-api
          fi

          # ----- 5. Restart -----
          systemctl restart molodost48-api
          sleep 3
          systemctl is-active molodost48-api
          REMOTE

      - name: Smoke test
        env:
          DEPLOY_KEY: ${{ secrets.MOLODOST_DEPLOY_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/dev/null \
              "$SERVER_USER@$SERVER_HOST" bash -s <<'REMOTE'
          set -e
          sleep 2
          echo "=== /healthz ==="
          curl -fsS --max-time 5 http://127.0.0.1:3000/healthz && echo OK || \
            (echo FAIL; journalctl -u molodost48-api -n 80 --no-pager; exit 1)
          echo "=== /readyz ==="
          curl -fsS --max-time 5 http://127.0.0.1:3000/readyz && echo OK || echo READY_WARN
          REMOTE