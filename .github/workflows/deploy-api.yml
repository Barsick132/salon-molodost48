name: deploy-api

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-api.yml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9.15.9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @molodost/api run db:generate
      - run: pnpm --filter @molodost/api run typecheck

      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.MOLODOST_DEPLOY_KEY }}
          source: "apps/api,packages/shared,package.json,pnpm-workspace.yaml,pnpm-lock.yaml"
          target: "/tmp/molodost48-build/"

      - name: Install + migrate + restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.MOLODOST_DEPLOY_KEY }}
          script: |
            set -e
            # Idempotent bootstrap
            id molodost 2>/dev/null || useradd -m -s /bin/bash -d /home/molodost molodost
            mkdir -p /var/www/molodost48/api /var/www/molodost48/web \
                     /var/log/molodost48 \
                     /var/lib/molodost48/uploads /var/lib/molodost48/backups \
                     /etc/molodost48
            chown -R molodost:molodost /var/www/molodost48 /var/log/molodost48 /var/lib/molodost48 /etc/molodost48 2>/dev/null || true

            STAGE=/var/www/molodost48/api.staging
            LIVE=/var/www/molodost48/api
            rm -rf "$STAGE"
            mkdir -p "$STAGE"
            cp -a /tmp/molodost48-build/. "$STAGE/"
            chown -R molodost:molodost "$STAGE"
            cd "$STAGE"

            # Make sure dependencies are installed (idempotent)
            sudo -u molodost bash -lc 'cd /var/www/molodost48/api.staging && pnpm install --prod --frozen-lockfile --ignore-scripts'

            # Apply migrations
            sudo -u molodost bash -lc 'cd /var/www/molodost48/api.staging/apps/api && pnpm exec prisma migrate deploy'

            # Atomic swap
            rm -rf "$LIVE"
            mv "$STAGE" "$LIVE"

            # Ensure systemd unit exists
            if [ ! -f /etc/systemd/system/molodost48-api.service ]; then
              echo "systemd unit missing — bootstrap manually"
              exit 1
            fi
            systemctl daemon-reload
            systemctl enable molodost48-api 2>/dev/null || true
            systemctl restart molodost48-api
            sleep 3
            systemctl is-active molodost48-api

      - name: Smoke test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.MOLODOST_DEPLOY_KEY }}
          script: |
            sleep 2
            echo "=== /healthz ==="
            curl -fsS --max-time 5 http://127.0.0.1:3000/healthz && echo OK || (echo FAIL; journalctl -u molodost48-api -n 80 --no-pager; exit 1)
            echo "=== /readyz ==="
            curl -fsS --max-time 5 http://127.0.0.1:3000/readyz && echo OK || echo READY_WARN

      - name: Cleanup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.MOLODOST_DEPLOY_KEY }}
          script: rm -rf /tmp/molodost48-build