# molodost48 nginx site config.
# Drop into /etc/nginx/sites-available/molodost48, symlink to sites-enabled/.
# Reload: sudo systemctl reload nginx

# HTTP -> HTTPS redirect (after TLS is provisioned)
server {
    listen 80;
    listen [::]:80;
    server_name molodost48.ru www.molodost48.ru _;

    # ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # For initial deployment before TLS, comment out the redirect and serve directly:
    # include /etc/nginx/snippets/molodost48-app.conf;

    location / {
        return 301 https://www.molodost48.ru$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name molodost48.ru www.molodost48.ru;

    ssl_certificate     /etc/letsencrypt/live/molodost48.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/molodost48.ru/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/molodost48.ru/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.youtube.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://dikidi.ru; frame-src https://www.youtube.com https://yandex.ru https://yandex.com https://*.yandex.ru https://*.yandex.com;" always;

    client_max_body_size 12M;

    # Static frontend
    root /var/www/molodost48/web;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Uploaded media
    location /media/ {
        alias /var/lib/molodost48/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Admin SPA fallback
    location /admin {
        try_files $uri $uri/ /index.html;
    }

    # Public SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # logging
    access_log /var/log/nginx/molodost48.access.log;
    error_log  /var/log/nginx/molodost48.error.log warn;
}