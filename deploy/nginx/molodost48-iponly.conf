# molodost48 nginx site config — IP-only (no TLS, no domain).
# Use this while you don't have a domain yet, to preview the site via http://31.42.120.181/.
# Once you have a domain + TLS, replace with molodost48.conf and re-run certbot.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 12M;

    root /var/www/molodost48/web;
    index index.html;

    # API reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Uploaded media
    location /media/ {
        alias /var/lib/molodost48/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # CORS for client-side canvas sampling (hero overlay). Same-origin
        # requests don't need CORS, but the hero overlay composable reads
        # pixel data with Canvas2D — without these headers the canvas gets
        # tainted and every getImageData() throws a SecurityError, so the
        # composable silently falls back to a default scrim. With these
        # headers, the script can sample the image and pick a real
        # colour-tinted scrim.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Max-Age 86400 always;
        if ($request_method = OPTIONS) {
            return 204;
        }
        access_log off;
    }

    # SPA fallback — admin and public
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # logging
    access_log /var/log/nginx/molodost48.access.log;
    error_log  /var/log/nginx/molodost48.error.log warn;
}