# dev-only nginx config (used by docker-compose).
server {
    listen 80;
    server_name _;
    client_max_body_size 12M;

    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /media/ {
        alias /var/lib/molodost48/uploads/;
        expires 7d;
    }

    location / {
        # In dev we run `pnpm --filter web dev` separately and hit it on :5173.
        return 200 'molodost48 dev API. Run `pnpm dev` for the web UI.';
        add_header Content-Type text/plain;
    }
}